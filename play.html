<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Twine — Play</title>
  <style>
    :root{
      --bg0:#07110c; --bg1:#0b1a12; --text:#e9fff2; --muted:#b7d8c6;
      --accent:#0b2a4a; --ring: rgba(82,255,154,.25);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background: linear-gradient(180deg, var(--bg0), #050a07 70%);
      color:var(--text);
    }
    header{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 16px;
      background: rgba(11,26,18,.78);
      border-bottom: 1px solid rgba(82,255,154,.12);
      position:sticky;top:0;z-index:10;
      backdrop-filter: blur(10px);
    }
    .left{display:flex;align-items:center;gap:12px;min-width:0}
    .back{
      cursor:pointer;
      padding:10px 12px;border-radius:999px;
      background: rgba(18,44,31,.55);
      border:1px solid rgba(82,255,154,.16);
      color:var(--text);
      font-weight:700;
    }
    .title{
      font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .btn{
      cursor:pointer;
      padding:10px 12px;border-radius:999px;
      background: linear-gradient(135deg, rgba(11,42,74,.75), rgba(13,58,99,.55));
      border:1px solid rgba(11,42,74,.45);
      color:var(--text);
      font-weight:700;
    }
    .stage{padding:12px}
    iframe{
      width:100%;
      height: calc(100vh - 76px);
      border-radius: var(--radius);
      border:1px solid rgba(82,255,154,.10);
      background: rgba(0,0,0,.35);
      box-shadow: 0 16px 44px rgba(0,0,0,.45);
    }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <button class="back" onclick="history.back()">←</button>
      <div class="title" id="gameTitle">Loading…</div>
    </div>
    <button class="btn" id="fs">Fullscreen</button>
  </header>

  <div class="stage">
    <iframe id="frame" src=""></iframe>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const title = params.get("title") || "Twine";
    const file = params.get("file"); // expected: games/<folder>/index.html

    document.getElementById("gameTitle").textContent = title;

    const frame = document.getElementById("frame");
    if (!file) {
      frame.srcdoc = "<h1 style='color:white;font-family:system-ui'>No game file provided.</h1>";
    } else {
      frame.src = file;
    }

    document.getElementById("fs").onclick = async () => {
      try {
        if (frame.requestFullscreen) await frame.requestFullscreen();
      } catch {}
    };
  </script>
</body>
</html>
